<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav mode="over" class="app-sidenav">
    <mat-nav-list>
      @for (item of navItems; track item.path) {
        <a mat-list-item [routerLink]="item.path" routerLinkActive="active"
           [routerLinkActiveOptions]="{exact: item.path === '/'}"
           (click)="sidenav.close()">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="app-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" class="menu-button">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="app-title" routerLink="/">Liturgiek Statistiek</span>
      <span class="spacer"></span>
      <nav class="desktop-nav">
        @for (item of navItems; track item.path) {
          <a mat-button [routerLink]="item.path" routerLinkActive="active-link"
             [routerLinkActiveOptions]="{exact: item.path === '/'}">
            {{ item.label }}
          </a>
        }
      </nav>
      <button mat-button class="login-button">
        <mat-icon>login</mat-icon>
        Inloggen
      </button>
    </mat-toolbar>

    <main class="app-content">
      <router-outlet />
    </main>

    <footer class="app-footer">
      <div class="footer-content">
        <span>&copy; 2026 Liturgiek Statistiek &mdash; Onderzoeksproject</span>
        <div class="footer-links">
          <a routerLink="/contact">Contact</a>
          <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
        </div>
      </div>
    </footer>
  </mat-sidenav-content>
</mat-sidenav-container>
