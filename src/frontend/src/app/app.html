<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav mode="over" class="app-sidenav">
    <mat-nav-list>
      @for (item of visibleNavItems; track item.path) {
        <a mat-list-item [routerLink]="item.path" routerLinkActive="active"
           [routerLinkActiveOptions]="{exact: item.path === '/'}"
           (click)="sidenav.close()">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="app-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" class="menu-button">
        <mat-icon>menu</mat-icon>
      </button>
      <img src="logo.png" alt="Liturgiek Statistiek" class="app-logo" routerLink="/" />
      <span class="spacer"></span>
      <nav class="desktop-nav">
        @for (item of visibleNavItems; track item.path) {
          <a mat-button [routerLink]="item.path" routerLinkActive="active-link"
             [routerLinkActiveOptions]="{exact: item.path === '/'}">
            {{ item.label }}
          </a>
        }
      </nav>
      <a mat-icon-button routerLink="/instellingen" aria-label="Instellingen"
         matTooltip="Instellingen" class="settings-button">
        <mat-icon>settings</mat-icon>
      </a>
      @if (auth.isAuthenticated$ | async) {
        <button mat-button [matMenuTriggerFor]="userMenu" class="user-button">
          <mat-icon>account_circle</mat-icon>
          <span class="user-name">{{ (auth.user$ | async)?.name }}</span>
        </button>
        <mat-menu #userMenu="matMenu">
          <button mat-menu-item disabled>
            <mat-icon>email</mat-icon>
            <span>{{ (auth.user$ | async)?.email }}</span>
          </button>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Uitloggen</span>
          </button>
        </mat-menu>
      } @else {
        <button mat-button class="login-button" (click)="login()">
          <mat-icon>login</mat-icon>
          Inloggen
        </button>
      }
    </mat-toolbar>

    <main class="app-content">
      <router-outlet />
    </main>

    <footer class="app-footer">
      <div class="footer-content">
        <span>&copy; 2026 Liturgiek Statistiek &mdash; Onderzoeksproject</span>
        <div class="footer-links">
          <a routerLink="/contact">Contact</a>
          <a href="https://github.com/gknife/LiturgiekStatistiek" target="_blank" rel="noopener">GitHub</a>
        </div>
      </div>
    </footer>
  </mat-sidenav-content>
</mat-sidenav-container>
