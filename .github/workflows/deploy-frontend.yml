name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'src/frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        # Fall back to regenerating the lockfile when npm ci reports it is out of
        # sync. This happens because npm prunes platform-specific optional peer
        # deps (e.g. @emnapi/core) from the lockfile on Windows, where the lock is
        # maintained, so they are missing for the Linux CI runner.
        run: npm ci || (npm install --package-lock-only --no-audit --no-fund && npm ci)

      - name: Run tests
        working-directory: src/frontend
        run: npm test

      - name: Build
        working-directory: src/frontend
        run: npm run build -- --configuration=production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: src/frontend/dist/frontend/browser
          skip_app_build: true
