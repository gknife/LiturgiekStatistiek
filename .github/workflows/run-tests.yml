name: Run Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        working-directory: src/backend
        run: dotnet restore

      - name: Build
        working-directory: src/backend
        run: dotnet build --no-restore

      - name: Run unit tests
        run: dotnet test tests/LiturgiekStatistiek.UnitTests --no-build --verbosity normal

      - name: Run integration tests
        run: dotnet test tests/LiturgiekStatistiek.IntegrationTests --no-build --verbosity normal

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        # Fall back to regenerating the lockfile when npm ci reports it is out of
        # sync. This happens because npm prunes platform-specific optional peer
        # deps (e.g. @emnapi/core) from the lockfile on Windows, where the lock is
        # maintained, so they are missing for the Linux CI runner.
        run: npm ci || (npm install --package-lock-only --no-audit --no-fund && npm ci)

      - name: Run tests
        working-directory: src/frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        working-directory: src/frontend
        run: npm run build
