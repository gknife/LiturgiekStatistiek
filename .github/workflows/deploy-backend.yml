name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'src/backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  AZURE_CONTAINER_REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: liturgiek-statistiek-api

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        working-directory: src/backend
        run: dotnet restore

      - name: Build
        working-directory: src/backend
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/LiturgiekStatistiek.UnitTests --no-build --configuration Release --verbosity normal

      - name: Run integration tests
        run: dotnet test tests/LiturgiekStatistiek.IntegrationTests --no-build --configuration Release --verbosity normal

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        working-directory: src/backend
        run: |
          docker build -t ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                       -t ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ca-liturgiek-api
          resourceGroup: rg-liturgiek-statistiek
          imageToDeploy: ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run EF Core Migrations
        working-directory: src/backend
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef database update --project LiturgiekStatistiek.Infrastructure --startup-project LiturgiekStatistiek.Api --connection "${{ secrets.SQL_CONNECTION_STRING }}"
